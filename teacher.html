<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCHOLARITE - Espace Enseignant</title>
    <link rel="stylesheet" href="teacher-style.css">
    <link rel="stylesheet" href="teacherdashboard-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="glass-bg"></div>

    <div id="app-container">
        <header class="teacher-header">
            <div class="brand">SCHOLARITE</div>
            <div class="teacher-profile">
                <span id="teacher-name">M. Jean DUPONT - 6e EP</span>
                <div class="profile-circle"></div>
            </div>
        </header>

        <main id="main-view">
            <section id="teacher-dashboard" class="page-view active">
                <div class="card date-card">
                    <h3 id="current-date">Dimanche, 26 Avril 2026</h3>
                </div>

                <div class="mobile-grid">
                    <div class="glass-card md">
                        <div class="pin"></div>
                        <h3>Moyenne Élèves</h3>
                        <div class="step-container">
                            <div class="step-move" id="loop-avg"></div>
                        </div>
                    </div>

                    <div class="glass-card sm">
                        <div class="pin"></div>
                        <h3>Signaux</h3>
                        <div class="signal-list">
                            <div class="sig-item"><i class="fas fa-check-circle txt-green"></i> Appel Fait</div>
                            <div class="sig-item"><i class="fas fa-exclamation-triangle txt-yellow"></i> Journal incomplet</div>
                        </div>
                    </div>

                    <div class="glass-card sm">
                        <div class="pin"></div>
                        <h3>Effectif F/G</h3>
                        <div class="static-data">
                            <p>Filles: <span class="txt-gold">14</span></p>
                            <p>Garçons: <span class="txt-blue">16</span></p>
                        </div>
                    </div>

                    <div class="glass-card sm">
                        <div class="pin"></div>
                        <h3>Top 5 (Moyenne)</h3>
                        <div class="step-container small">
                            <div class="step-move" id="loop-top5"></div>
                        </div>
                    </div>

                    <div class="glass-card sm">
                        <div class="pin"></div>
                        <h3>Alerte : 5 Derniers</h3>
                        <div class="step-container small">
                            <div class="step-move" id="loop-bottom5"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <div class="nav-btn active" onclick="showPage('dashboard')">
                <i class="fas fa-th-large"></i><span>Dashboard</span>
            </div>
            <div class="nav-btn" onclick="showPage('saisie')">
                <i class="fas fa-edit"></i><span>Saisie</span>
            </div>
            <div class="nav-btn" onclick="showPage('appel')">
                <i class="fas fa-user-check"></i><span>Appel</span>
            </div>
            <div class="nav-btn" onclick="showPage('carnet')">
                <i class="fas fa-address-book"></i><span>Carnet</span>
            </div>
            <div class="nav-btn" onclick="showPage('journal')">
                <i class="fas fa-book-open"></i><span>Journal</span>
            </div>
        </nav>
    </div>

    <script src="teacher-app.js"></script>
</body>
    </html>
