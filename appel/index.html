<!-- appel/index.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCOLARITE - Registre d'Appel</title>
    <link rel="stylesheet" href="../shared/css/style.css">
    <style>
        .header-pro { padding: 20px; background: rgba(0,0,0,0.3); border-bottom: 1px solid #BF953F; }
        .date-picker-container { margin: 15px 0; display: flex; justify-content: center; gap: 10px; }
        .student-card { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 15px; margin-bottom: 8px; border-radius: 10px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(191,149,63,0.1);
        }
        .status-group { display: flex; gap: 5px; }
        .btn-status { 
            padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.1);
            background: transparent; color: white; cursor: pointer; transition: 0.2s;
        }
        /* Couleurs pro */
        .btn-status.p.active { background: #2ecc71; color: white; border-color: #27ae60; }
        .btn-status.a.active { background: #e74c3c; color: white; border-color: #c0392b; }
        .btn-status.r.active { background: #f1c40f; color: black; border-color: #f39c12; }
        
        #lockBadge { 
            display: none; padding: 5px 15px; background: rgba(191,149,63,0.2); 
            color: #BF953F; border-radius: 20px; font-size: 0.8rem; margin-bottom: 15px; text-align: center;
        }
    </style>
</head>
<body>
    <div class="header-pro">
        <a href="../dashboard/index.html" style="color:#BF953F; text-decoration:none;">← Dashboard</a>
        <h2 class="gold-text" style="margin:10px 0 0 0;">REGISTRE NUMÉRIQUE</h2>
    </div>

    <main style="padding: 15px;">
        <div class="date-picker-container">
            <input type="date" id="dateSelector" class="glass-card" style="color:white; padding:8px;">
        </div>

        <div id="lockBadge">🔒 Appel archivé pour cette date</div>

        <div id="studentList">
            <!-- Liste générée par JS -->
        </div>

        <div id="actionArea" style="margin-top:25px;">
            <button id="saveAppel" class="btn-gold">VALIDER L'APPEL</button>
            <button id="editMode" class="btn-gold" style="display:none; background:transparent; border:1px solid #BF953F;">MODIFIER L'APPEL</button>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../shared/js/config.js"></script>
    <script src="appel-logic.js"></script>
</body>
</html>
