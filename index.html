<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SCHOLARITE - Signature Design</title>
    
    <link rel="stylesheet" href="teacher-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="side-drawer" class="side-drawer">
        <div class="drawer-content">
            <div class="drawer-header">
                <span class="brand-small">OPTIONS</span>
                <div id="close-drawer" class="close-trigger">
                    <i class="fas fa-times txt-gold"></i>
                </div>
            </div>
            
            <div class="drawer-menu">
                <div class="drawer-item" data-target="view-profil">
                    <i class="fas fa-user-circle txt-gold"></i> <span>Profil</span>
                </div>
                <div class="drawer-item" data-target="view-casier">
                    <i class="fas fa-folder-open txt-gold"></i> <span>Casier Élève</span>
                </div>
                <div class="drawer-item" data-target="view-liste">
                    <i class="fas fa-clipboard-list txt-gold"></i> <span>Liste</span>
                </div>
                <div class="drawer-item" data-target="view-stats">
                    <i class="fas fa-chart-line txt-gold"></i> <span>Statistiques</span>
                </div>
                <div class="drawer-item" data-target="view-settings">
                    <i class="fas fa-cog txt-gold"></i> <span>Paramètres</span>
                </div>
                <div class="drawer-item" data-target="view-about">
                    <i class="fas fa-info-circle txt-gold"></i> <span>À-propos</span>
                </div>
            </div>
            
            <div class="drawer-footer" style="text-align: center; margin-top: 30px; opacity: 0.3;">
                <small style="letter-spacing: 2px;">SPIRAL AGENCE • 2026</small>
            </div>
        </div>
    </div>

    <header class="teacher-header">
        <div class="header-content">
            <div class="profile-mini">
                <img src="https://i.pravatar.cc/150?u=prof" id="prof-img" alt="Photo Prof">
                <div class="profile-info">
                    <h4>M. Jean DUPONT</h4>
                    <small><i class="fas fa-map-marker-alt" style="font-size: 0.5rem;"></i> KINSHASA | 6<sup>e</sup> EP</small>
                </div>
            </div>

            <div class="brand-small">SCHOLARITE</div>
            
            <div id="menu-trigger" class="hamburger-menu">
                <div class="bar-top"></div>
                <div class="bar-mid"></div> <div class="bar-bottom"></div>
            </div>
        </div>
    </header>

    <main id="main-view" class="content-area">
        <section id="view-dashboard" class="tab-content active">
            <div class="date-badge">28 AVRIL 2026</div>
            
            <div class="teacher-grid">
                <div class="glass-box">
                    <h3><i class="fas fa-archive"></i> RÉSUMÉ PRÉSENCES</h3>
                    <div class="list-item-black">
                        <span class="label">Présents</span>
                        <span class="txt-green value">450</span>
                    </div>
                    <div class="list-item-black">
                        <span class="label">Absents</span>
                        <span class="txt-red value">38</span>
                    </div>
                </div>

                <div class="glass-box">
                    <h3 class="txt-gold"><i class="fas fa-user-check"></i> POINTAGE RAPIDE</h3>
                    <div id="top-5">
                        </div>
                </div>
            </div>
        </section>
        <section id="dynamic-content" class="tab-content"></section>
    </main>

    <nav class="mobile-nav">
        <div class="nav-btn active" data-target="view-dashboard">
            <i class="fas fa-home"></i><span>Dash</span>
        </div>
        <div class="nav-btn" data-target="view-saisie">
            <i class="fas fa-list-ol"></i><span>Cotes</span>
        </div>
        <div class="nav-btn" data-target="view-appel">
            <i class="fas fa-check-square"></i><span>Appel</span>
        </div>
        <div class="nav-btn" data-target="view-carnet">
            <i class="fas fa-users"></i><span>Carnet</span>
        </div>
        <div class="nav-btn" data-target="view-journal">
            <i class="fas fa-book"></i><span>Journal</span>
        </div>
    </nav>

    <script src="teacher-app.js"></script>
</body>
</html>
