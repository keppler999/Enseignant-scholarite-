<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SCHOLARITE - Signature Design</title>
    
    <link rel="stylesheet" href="teacher-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="side-drawer" class="side-drawer">
        <div class="drawer-content">
            <div class="drawer-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                <span style="font-size: 0.75rem; letter-spacing: 4px; font-weight: 900; color: var(--gold);">OPTIONS</span>
                <div id="close-drawer" style="cursor: pointer; padding: 10px;">
                    <i class="fas fa-times txt-gold" style="font-size: 1.3rem;"></i>
                </div>
            </div>
            
            <div class="drawer-menu">
                <div class="drawer-item" data-target="view-profil">
                    <i class="fas fa-user-circle txt-gold"></i> <span>Profil Enseignant</span>
                </div>
                <div class="drawer-item" data-target="view-casier">
                    <i class="fas fa-folder-open txt-gold"></i> <span>Casier Numérique</span>
                </div>
                <div class="drawer-item" data-target="view-stats">
                    <i class="fas fa-chart-line txt-gold"></i> <span>Rapports Statistiques</span>
                </div>
                <div class="drawer-item" data-target="view-settings">
                    <i class="fas fa-cog txt-gold"></i> <span>Configuration</span>
                </div>
            </div>
            
            <div style="position: absolute; bottom: 40px; left: 0; width: 100%; text-align: center; opacity: 0.3;">
                <div style="width: 25px; height: 1px; background: var(--gold); margin: 0 auto 15px; opacity: 0.5;"></div>
                <small style="letter-spacing: 3px; font-size: 0.55rem; font-weight: 900; color: var(--gold);">SPIRAL ENGINE v3.0</small>
            </div>
        </div>
    </div>

    <header class="teacher-header">
        <div class="header-content">
            <div class="profile-mini" id="trigger-profile-edit" style="cursor:pointer;">
                <img src="https://i.pravatar.cc/150?u=prof" id="prof-img" alt="Photo Prof">
                <div class="profile-info">
                    <h4 id="prof-name">M. Jean DUPONT</h4>
                    <small><i class="fas fa-map-marker-alt" style="font-size: 0.5rem; margin-right: 4px;"></i> KINSHASA | 6<sup>e</sup> EP</small>
                </div>
            </div>

            <div class="header-right-block">
                <div class="brand-small">SCOLARITE</div>
                <div id="menu-trigger" class="hamburger-menu">
                    <div class="bar-top"></div>
                    <div class="bar-mid"></div>
                    <div class="bar-bottom"></div>
                </div>
            </div>
        </div>
    </header>

    <main id="main-view" class="content-area">
        
        <section id="view-dashboard" class="tab-content active">
            <div class="date-badge" id="current-date">-- AVRIL 2026</div>
            <div class="teacher-grid">
                <div class="glass-box">
                    <h3><i class="fas fa-archive"></i> RÉSUMÉ PRÉSENCES</h3>
                    <div class="list-item-black">
                        <span class="label">Présents</span>
                        <span class="txt-green value" id="dash-presents">0</span>
                    </div>
                    <div class="list-item-black">
                        <span class="label">Absents</span>
                        <span class="txt-red value" id="dash-absents">0</span>
                    </div>
                </div>
                <div class="glass-box">
                    <h3 class="txt-gold"><i class="fas fa-user-check"></i> POINTAGE RAPIDE</h3>
                    <div id="top-5"></div>
                </div>
            </div>
        </section>

        <section id="view-casier" class="tab-content">
            </section>

        <section id="view-saisie" class="tab-content"></section>
        <section id="view-appel" class="tab-content"></section>
        <section id="view-carnet" class="tab-content"></section>

    </main>

    <div id="modal-eleve" class="modal-overlay">
        <div class="modal-content glass-premium">
            <h3 class="txt-gold" style="margin-top:0;">FICHE ÉLÈVE</h3>
            <form id="form-eleve">
                <div class="photo-upload-zone" style="text-align:center; margin-bottom:20px;">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" id="preview-photo" class="profile-glow" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--gold); margin-bottom:10px;">
                    <div style="display:flex; justify-content:center; gap:10px;">
                        <button type="button" class="btn-mini-gold" onclick="document.getElementById('input-photo').click()">Importer</button>
                        <button type="button" class="btn-mini-white" id="btn-library">Bibliothèque</button>
                    </div>
                    <input type="file" id="input-photo" hidden accept="image/*">
                </div>
                
                <div class="form-grid-luxe">
                    <input type="text" placeholder="Nom" required id="f-nom">
                    <input type="text" placeholder="Post-nom" id="f-postnom">
                    <input type="text" placeholder="Prénom" id="f-prenom">
                    <select id="f-sexe">
                        <option value="M">Masculin (M)</option>
                        <option value="F">Féminin (F)</option>
                    </select>
                    <input type="date" id="f-birth">
                    <input type="text" placeholder="Nom complet parents" id="f-parents">
                    <input type="tel" placeholder="Téléphone (Parents)" id="f-tel">
                    <textarea placeholder="Adresse de résidence" id="f-adresse"></textarea>
                </div>
                
                <div class="form-actions" style="margin-top:20px; display:flex; gap:10px;">
                    <button type="button" class="btn-cancel" id="btn-close-modal" style="flex:1;">Annuler</button>
                    <button type="submit" class="btn-publish" style="flex:2;">ENREGISTRER</button>
                </div>
            </form>
        </div>
    </div>

    <nav class="mobile-nav">
        <div class="nav-btn active" data-target="view-dashboard">
            <i class="fas fa-home"></i><span>Dash</span>
        </div>
        <div class="nav-btn" data-target="view-saisie">
            <i class="fas fa-list-ol"></i><span>Cotes</span>
        </div>
        <div class="nav-btn" data-target="view-appel">
            <i class="fas fa-check-square"></i><span>Appel</span>
        </div>
        <div class="nav-btn" data-target="view-carnet">
            <i class="fas fa-users"></i><span>Carnet</span>
        </div>
        <div class="nav-btn" data-target="view-journal">
            <i class="fas fa-book"></i><span>Journal</span>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>
    <script src="teacher-app.js"></script>
</body>
            </html>
