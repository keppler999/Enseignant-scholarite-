<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SCOLARITE - Démarrage...</title>
    <link rel="stylesheet" href="shared/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #050505;
            overflow: hidden;
            margin: 0;
        }

        .splash-panel {
            text-align: center;
            padding: 40px;
            width: 85%;
            max-width: 400px;
        }

        .logo-gold-anim {
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 3px;
            animation: pulse-gold 2s infinite ease-in-out;
            margin-bottom: 10px;
        }

        .loading-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
            margin: 25px 0;
            border: 1px solid rgba(191, 149, 63, 0.1);
        }

        .bar-progress {
            width: 0%;
            height: 100%;
            background: var(--gold);
            animation: load-progress 2s forwards ease-out;
        }

        @keyframes pulse-gold {
            0%, 100% { opacity: 1; text-shadow: 0 0 20px rgba(191, 149, 63, 0.6); }
            50% { opacity: 0.7; text-shadow: 0 0 10px rgba(191, 149, 63, 0.3); }
        }

        @keyframes load-progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>

    <main class="glass-card splash-panel">
        <h1 class="logo-gold-anim">SCOLARITE</h1>
        <p style="color: rgba(255,255,255,0.5); font-size: 0.8rem; letter-spacing: 1px;">PLATEFORME ÉDUCATIVE</p>
        
        <div class="loading-bar">
            <div class="bar-progress"></div>
        </div>

        <p id="status-text" style="color: #BF953F; font-weight: bold; font-size: 0.75rem; text-transform: uppercase;">VÉRIFICATION DE LA SESSION...</p>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="shared/js/config.js"></script>
    <script>
        window.onload = () => {
            const status = document.getElementById('status-text');

            // On laisse l'animation de la barre se faire (2 secondes)
            setTimeout(() => {
                try {
                    // Utilisation de la fonction isSessionValid définie dans ton config.js
                    if (typeof isSessionValid === "function" && isSessionValid()) {
                        status.innerText = "SESSION VALIDE - REDIRECTION...";
                        window.location.href = "dashboard/index.html";
                    } else {
                        status.innerText = "AUTHENTIFICATION REQUISE...";
                        window.location.href = "auth/index.html";
                    }
                } catch (error) {
                    console.error("Erreur de redirection:", error);
                    // En cas d'erreur critique, on renvoie au login par sécurité
                    window.location.href = "auth/index.html";
                }
            }, 2300); 
        };
    </script>
</body>
</html>
