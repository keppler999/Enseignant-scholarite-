<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCHOLARITE - Interface Enseignant</title>
    <link rel="stylesheet" href="teacher-style.css">
    <link rel="stylesheet" href="cote-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="glass-bg"></div>

    <header class="teacher-header">
        <div class="header-content">
            <div class="profile-mini">
                <img src="https://via.placeholder.com/40" id="prof-img" alt="Photo Prof">
                <div>
                    <h4>M. Jean DUPONT</h4>
                    <small>6e EP - Kinshasa</small>
                </div>
            </div>
            <div class="brand-small">SCHOLARITE</div>
        </div>
    </header>

    <main id="main-view" class="content-area">
        
        <section id="view-dashboard" class="tab-content active">
            <div class="date-card">28 Avril 2026</div>
            
            <div class="teacher-grid">
                <div class="glass-box">
                    <h3><i class="fas fa-chart-line"></i> Moyennes Classe</h3>
                    <div class="scroller" id="scroll-averages">
                        </div>
                </div>

                <div class="glass-box sm">
                    <h3><i class="fas fa-bell"></i> Statut Tâches</h3>
                    <div id="task-status">
                        <div class="status-item"><i class="fas fa-check-circle txt-green"></i> Appel fait</div>
                        <div class="status-item"><i class="fas fa-times-circle txt-red"></i> Journal incomplet</div>
                    </div>
                </div>

                <div class="glass-box sm">
                    <h3><i class="fas fa-users"></i> Effectif</h3>
                    <div class="sex-stats">
                        <span><i class="fas fa-venus"></i> F: 12</span>
                        <span><i class="fas fa-mars"></i> G: 18</span>
                    </div>
                </div>

                <div class="glass-box">
                    <h3 class="txt-gold">Top 5 Élèves</h3>
                    <div id="top-5" class="list-mini"></div>
                </div>

                <div class="glass-box">
                    <h3 class="txt-red">Derniers 5</h3>
                    <div id="bottom-5" class="list-mini"></div>
                </div>
            </div>
        </section>

        <section id="dynamic-content" class="tab-content"></section>

    </main>

    <nav class="mobile-nav">
        <div class="nav-btn active" data-target="view-dashboard">
            <i class="fas fa-th-large"></i><span>Dash</span>
        </div>
        <div class="nav-btn" data-target="view-saisie">
            <i class="fas fa-edit"></i><span>Cotes</span>
        </div>
        <div class="nav-btn" data-target="view-appel">
            <i class="fas fa-user-check"></i><span>Appel</span>
        </div>
        <div class="nav-btn" data-target="view-carnet">
            <i class="fas fa-address-book"></i><span>Carnet</span>
        </div>
        <div class="nav-btn" data-target="view-journal">
            <i class="fas fa-book-open"></i><span>Journal</span>
        </div>
    </nav>

    <script src="teacher-app.js"></script>
</body>
</html>
