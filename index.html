<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SCOLARITE - Démarrage...</title>
    <!-- On lie les fichiers partagés qui sont maintenant corrects -->
    <link rel="stylesheet" href="shared/css/style.css">
    <style>
        /* CSS spécifique pour le Splash Screen */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #050505;
            overflow: hidden;
        }

        .splash-panel {
            text-align: center;
            padding: 40px;
            max-width: 400px;
        }

        .logo-gold-anim {
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 3px;
            animation: pulse-gold 2s infinite ease-in-out;
            margin-bottom: 20px;
        }

        .loading-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
            margin: 20px 0;
            border: 1px solid rgba(191, 149, 63, 0.1);
        }

        .bar-progress {
            width: 0%;
            height: 100%;
            background: var(--gold);
            animation: load-progress 1.5s forwards ease-out;
        }

        @keyframes pulse-gold {
            0%, 100% { opacity: 1; text-shadow: 0 0 20px rgba(191, 149, 63, 0.6); }
            50% { opacity: 0.7; text-shadow: 0 0 10px rgba(191, 149, 63, 0.3); }
        }

        @keyframes load-progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>

    <main class="glass-card splash-panel">
        <h1 class="logo-gold-anim">SCOLARITE</h1>
        <p style="color: rgba(255,255,255,0.6); font-size: 0.9rem;">PLATEFORME ÉDUCATIVE</p>
        
        <div class="loading-bar">
            <div class="bar-progress"></div>
        </div>

        <p style="color: #BF953F; font-weight: bold; font-size: 0.8rem;">VÉRIFICATION DE LA SESSION...</p>
    </main>

    <!-- Supabase et Logique -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="shared/js/config.js"></script>
    <script>
        // Logique de redirection
        window.onload = () => {
            // L'animation dure 1.5s, on laisse un petit délai
            setTimeout(() => {
                const sessionOK = checkSession(); // Fonction dans shared/js/config.js

                if (sessionOK) {
                    window.location.href = "dashboard/index.html";
                } else {
                    window.location.href = "auth/index.html";
                }
            }, 2000); // 2 secondes de chargement
        };
    </script>
</body>
</html>
