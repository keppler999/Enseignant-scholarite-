<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SCHOLARITE - Mobile App</title>
    
    <link rel="stylesheet" href="teacher-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-bg"></div>

    <header class="teacher-header">
        <div class="header-content" style="display: flex; justify-content: space-between; align-items: center;">
            <div class="profile-mini" style="display: flex; align-items: center; gap: 12px;">
                <img src="https://i.pravatar.cc/150?u=prof" id="prof-img" alt="Photo Prof">
                <div>
                    <h4 style="margin:0; font-size: 1rem;">M. Jean DUPONT</h4>
                    <small style="opacity: 0.6;">6<sup>e</sup> EP - Kinshasa</small>
                </div>
            </div>
            <div class="brand-small" style="color: var(--gold); font-weight: 800; letter-spacing: 2px;">SCHOLARITE</div>
        </div>
    </header>

    <main id="main-view" class="content-area">
        
        <section id="view-dashboard" class="tab-content active">
            
            <div class="date-card">28 Avril 2026</div>
            
            <div class="teacher-grid">
                
                <div class="glass-box">
                    <h3><i class="fas fa-archive"></i> CASIER ÉLÈVE</h3>
                    <div class="list-item-black">
                        <span>Présents aujourd'hui</span>
                        <span class="txt-green" style="font-size: 1.3rem;">450</span>
                    </div>
                    <div class="list-item-black">
                        <span>Absents enregistrés</span>
                        <span class="txt-red" style="font-size: 1.3rem;">38</span>
                    </div>
                </div>

                <div class="glass-box">
                    <h3><i class="fas fa-graduation-cap"></i> ACADÉMIQUE</h3>
                    <div class="list-item-black">
                        <span>Moyenne de la classe</span>
                        <span class="txt-gold" style="font-size: 1.3rem;">78%</span>
                    </div>
                </div>

                <div class="glass-box">
                    <h3><i class="fas fa-wallet"></i> FINANCES</h3>
                    <div class="list-item-black">
                        <span>Frais de scolarité payés</span>
                        <span class="txt-green">97%</span>
                    </div>
                    <div style="width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: -5px; overflow: hidden;">
                        <div style="width: 97%; height: 100%; background: var(--gold);"></div>
                    </div>
                </div>

                <div class="glass-box">
                    <h3 class="txt-gold"><i class="fas fa-user-check"></i> POINTAGE RAPIDE</h3>
                    <div id="top-5">
                        </div>
                </div>

            </div>
        </section>

        <section id="dynamic-content" class="tab-content"></section>

    </main>

    <nav class="mobile-nav">
        <div class="nav-btn active" data-target="view-dashboard">
            <i class="fas fa-home"></i><span>Dash</span>
        </div>
        <div class="nav-btn" data-target="view-saisie">
            <i class="fas fa-list-ol"></i><span>Cotes</span>
        </div>
        <div class="nav-btn" data-target="view-appel">
            <i class="fas fa-check-square"></i><span>Appel</span>
        </div>
        <div class="nav-btn" data-target="view-carnet">
            <i class="fas fa-users"></i><span>Carnet</span>
        </div>
        <div class="nav-btn" data-target="view-journal">
            <i class="fas fa-book"></i><span>Journal</span>
        </div>
    </nav>

    <script src="teacher-app.js"></script>
</body>
</html>
