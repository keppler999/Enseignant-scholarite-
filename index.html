<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scholarite | Tableau de Bord Enseignant</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Structure de mise en page */
        body { margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Barre latérale (Sidebar) - Bande noire transparente */
        nav.sidebar {
            width: 250px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Espace de travail principal */
        main.content {
            flex: 1;
            padding: 30px;
            background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
            overflow-y: auto;
        }

        /* Conteneur des cartes (Grid) */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2 style="color: gold;">Scholarite</h2>
        <ul style="list-style: none; padding: 0; color: white;">
            <li>Tableau de bord</li>
            <li>Registre d'appel</li>
            <li>Bulletins</li>
            <li>Journal de classe</li>
        </ul>
    </nav>

    <main class="content">
        <h1 style="color: white; margin-bottom: 30px;">Bonjour, Kambale</h1>

        <div class="dashboard-grid">
            <div class="glass-card">
                <h3>Journal de classe</h3>
                <p>Planification du jour.</p>
            </div>

            <div class="glass-card">
                <h3>Bulletins</h3>
                <p>Gestion des notes.</p>
            </div>

            <div class="glass-card">
                <h3>Registre d'appel</h3>
                <p>Pointage quotidien.</p>
            </div>
        </div>
    </main>

</body>
</html>
