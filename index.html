<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scholarite | Signature Engine</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#000000">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="teacher-header">
        <div class="brand">SCOLARITE</div>
        <div id="user-profile"></div>
    </header>

    <main id="app-root"></main>

    <nav class="mobile-nav">
        <button class="nav-btn" data-view="dashboard"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="nav-btn" data-view="notes"><i class="fas fa-pen-nib"></i><span>Cotes</span></button>
        <button class="nav-btn" data-view="appel"><i class="fas fa-check-double"></i><span>Appel</span></button>
        <button class="nav-btn" data-view="journal"><i class="fas fa-book"></i><span>Journal</span></button>
        <button class="nav-btn" data-view="casier"><i class="fas fa-user-graduate"></i><span>Casier</span></button>
        <button class="nav-btn" data-view="settings"><i class="fas fa-cog"></i><span>Réglages</span></button>
    </nav>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log("Scholarite : Mode Offline activé."))
                .catch((err) => console.log("Erreur d'enregistrement SW : ", err));
        }
    </script>

    <script type="module" src="main.js"></script>
</body>
</html>
