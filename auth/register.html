<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SCOLARITE - Inscription</title>
    <link rel="stylesheet" href="../shared/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            padding: 20px;
        }
        .register-wrapper {
            width: 100%;
            max-width: 450px;
        }
    </style>
</head>
<body>

    <div class="register-wrapper">
        <main class="glass-card">
            <div style="text-align: center; margin-bottom: 25px;">
                <h1 class="gold-text">INSCRIPTION</h1>
                <p style="color: rgba(255,255,255,0.5); font-size: 0.85rem;">Créer votre profil Enseignant</p>
            </div>

            <form id="registerForm">
                <div class="input-field">
                    <label>Nom complet</label>
                    <input type="text" id="fullName" placeholder="Ex: Jean Mukendi" required>
                </div>

                <div class="input-field">
                    <label>Email professionnel</label>
                    <input type="email" id="email" placeholder="nom@ecole.com" required>
                </div>

                <div class="input-field">
                    <label>École / Institution</label>
                    <input type="text" id="schoolName" placeholder="Ex: Collège Maranatha" required>
                </div>

                <div class="input-field">
                    <label>Mot de passe</label>
                    <input type="password" id="password" placeholder="Min. 6 caractères" required>
                </div>

                <button type="submit" id="btnRegister" class="btn-gold">Créer mon compte</button>
            </form>

            <div id="msg" style="margin-top: 15px; font-size: 0.85rem; text-align: center;"></div>

            <div style="margin-top: 20px; text-align: center; font-size: 0.9rem;">
                <a href="index.html" style="color: rgba(255,255,255,0.6); text-decoration: none;">
                    Déjà inscrit ? <span style="color: #BF953F;">Se connecter</span>
                </a>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../shared/js/config.js"></script>
    <script src="register-logic.js"></script>
</body>
</html>
