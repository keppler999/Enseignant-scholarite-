<div class="page-container" style="padding: 10px; padding-bottom: 100px;">
    
    <div class="glass-box" style="margin-bottom: 20px; border-radius: 24px; text-align: center;">
        <div style="display: flex; justify-content: center; align-items: center; gap: 15px;">
            <div style="background: var(--gold); color: #000; padding: 10px; border-radius: 15px; font-weight: 900; line-height: 1;">
                <span style="font-size: 0.7rem; display: block; text-transform: uppercase;">Mardi</span>
                <span style="font-size: 1.4rem;">28</span>
            </div>
            <div style="text-align: left;">
                <h3 style="margin: 0; font-size: 0.9rem;">AVRIL 2026</h3>
                <small style="opacity: 0.6; text-transform: uppercase; letter-spacing: 1px;">Journal de classe</small>
            </div>
        </div>
    </div>

    <div class="glass-box" style="margin-bottom: 20px; border-radius: 24px;">
        <h3 style="font-size: 0.75rem; color: var(--gold); margin-bottom: 15px;">
            <i class="fas fa-clock"></i> EMPLOI DU TEMPS DU JOUR
        </h3>
        
        <div id="schedule-container" style="display: flex; flex-direction: column; gap: 8px;">
            <div style="text-align: center; padding: 15px; opacity: 0.5;">Chargement du programme...</div>
        </div>
    </div>

    <div class="glass-box" style="border-radius: 24px;">
        <h3 style="font-size: 0.75rem; color: var(--gold); margin-bottom: 15px;">
            <i class="fas fa-edit"></i> DÉTAILS DE LA LEÇON
        </h3>

        <div style="margin-bottom: 15px;">
            <label style="font-size: 0.6rem; opacity: 0.5; display: block; margin: 0 0 5px 10px;">TITRE / SUJET DE LA LEÇON</label>
            <textarea id="lesson-topic" class="list-item-black" placeholder="Ex: Les affluents du fleuve Congo..." style="width: 100%; border: 1px solid var(--border-white); color: #fff; min-height: 80px; padding: 15px; border-radius: 15px; font-family: inherit; resize: none; outline: none;"></textarea>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="font-size: 0.6rem; opacity: 0.5; display: block; margin: 0 0 5px 10px;">OBSERVATIONS PÉDAGOGIQUES</label>
            <input type="text" id="lesson-obs" class="list-item-black" placeholder="Ex: Bonne compréhension globale..." style="width: 100%; border: 1px solid var(--border-white); color: #fff; padding: 15px; border-radius: 15px; outline: none;">
        </div>

        <button id="save-journal-btn" style="width: 100%; padding: 20px; border-radius: 20px; border: none; background: var(--gold); color: #000; font-weight: 900; font-size: 1rem; text-transform: uppercase; box-shadow: 0 10px 30px rgba(212,175,55,0.2); cursor: pointer;">
            Enregistrer le journal
        </button>
    </div>
</div>
