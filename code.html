<div class="page-container" style="padding: 10px; padding-bottom: 100px;">
    
    <div class="glass-box" style="margin-bottom: 20px; border-radius: 24px;">
        <h3 style="font-size: 0.7rem; color: var(--gold); margin-bottom: 15px;">
            <i class="fas fa-tag"></i> CONFIGURATION DE LA SAISIE
        </h3>
        
        <div style="margin-bottom: 15px;">
            <label style="font-size: 0.65rem; opacity: 0.6; display: block; margin-bottom: 5px; margin-left: 10px;">BRANCHE PRINCIPALE</label>
            <select id="branch-select" class="list-item-black" style="width: 100%; border: 1px solid var(--border); color: #fff; appearance: none;">
                <option value="langues">Communication / Français</option>
                <option value="mathematiques">Mathématiques</option>
                <option value="eveil">Éveil Scientifique</option>
                <option value="arts">Arts / Culture</option>
                <option value="civisme">Éducation à la Vie</option>
            </select>
        </div>

        <div>
            <label style="font-size: 0.65rem; opacity: 0.6; display: block; margin-bottom: 5px; margin-left: 10px;">SOUS-COURS CONCERNÉ</label>
            <select id="course-select" class="list-item-black" style="width: 100%; border: 1px solid var(--border); color: var(--gold); appearance: none; font-weight: 700;">
                <option value="grammaire">Grammaire / Conjugaison</option>
                <option value="lecture">Lecture / Élocution</option>
                <option value="calcul">Calcul Mental</option>
                <option value="geographie">Géographie</option>
                <option value="sciences">Sciences Naturelles</option>
            </select>
        </div>
    </div>

    <div class="glass-box" style="border-radius: 24px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="margin: 0;"><i class="fas fa-edit"></i> SAISIE DES NOTES</h3>
            <span id="points-counter" style="font-size: 0.7rem; background: var(--gold); color: #000; padding: 2px 8px; border-radius: 10px; font-weight: 800;">0 / 12</span>
        </div>

        <div style="width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; margin-bottom: 20px; overflow: hidden;">
            <div id="progress-bar" style="width: 0%; height: 100%; background: var(--gold); transition: 0.4s;"></div>
        </div>

        <div id="students-list-container" style="display: flex; flex-direction: column; gap: 8px;">
            </div>

        <button id="save-all-btn" style="width: 100%; margin-top: 25px; padding: 18px; border-radius: 18px; border: none; background: var(--gold); color: #000; font-weight: 800; font-size: 1rem; letter-spacing: 1px; box-shadow: 0 10px 25px rgba(212,175,55,0.3);">
            VALIDER LA COTATION
        </button>
    </div>

</div>
